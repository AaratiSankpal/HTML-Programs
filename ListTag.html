<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Tag</title>
<style>
body{
    font-family: Arial;
    background-color: #f0fff0;
}

ol, ul{
    list-style-position: inside;
    margin: 20px;
    font-size: 20px;
}

li:hover{
    color: green;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Programming Languages</h2>

<ol>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
</ol>

<ul>
<li>Apple</li>
<li>Mango</li>
<li>Banana</li>
</ul>

</body>
</html>
