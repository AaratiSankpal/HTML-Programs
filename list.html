<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
</head>
<body>
    <h1>list tag</h1>
    <h2>ordered tag</h2>

    <!--<ol type="I">-->
        <ol reversed>
            <li>ram</li>
            <li>sham</li>
            <li>riya</li>
            <li>ovi</li>
        </ol>
        <ol start="10">
         <li>html</li>
        <li>css</li>
        <li>javascript</li>
        <li>bootstrap</li>
        </ol>

    <h2>unordered list </h2>
    <ul type="circle">
        <li>red</li>
        <li>black</li>
        <li>blue</li>
        <li>pink</li>
        <li>orange</li>
 </ul>


    <h2>nested list</h2>
    <ol type="I">
    <li>red</li>
        <li>black</li>
        <li>blue</li>
        <li>pink</li>
    </ol>
<ul type="square">
        <li>two</li>
        <li>one</li>
    </ul>
    <ol type="A">
        <li>orange</li>
        <li>pink</li>
    </ol>
</body>
</html>
