<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* Section Container */
.contact-section {
    display: flex;
    flex-wrap: wrap;
    min-height: 100vh;
}

/* Contact Form */
.contact-form {
    flex: 1 1 50%;
    padding: 40px;
    background: white;
}

.contact-form h2 {
    margin-top: 0;
}

form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

input, textarea {
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

textarea {
    resize: vertical;
    min-height: 120px;
}

button {
    padding: 12px;
    font-size: 16px;
    border: none;
    background: black;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #333;
}

/* Map Section */
.map {
    flex: 1 1 50%;
}

.map iframe {
    width: 100%;
    height: 100%;
    min-height: 400px;
    border: 0;
}

/* Mobile Layout */
@media (max-width: 768px) {
    .contact-form,
    .map {
        flex: 1 1 100%;
    }
}
</style>
</head>
<body>

<section class="contact-section">

    <!-- Contact Form -->
    <div class="contact-form">
        <h2>Contact Us</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message"></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <!-- Embedded Map -->
    <div class="map">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.019623227948!2d-122.41941568468152!3d37.774929779759974!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085809c5f6d2c23%3A0x1234567890abcdef!2sSan%20Francisco!5e0!3m2!1sen!2sus!4v1610000000000">
        </iframe>
    </div>

</section>

</body>
</html>
