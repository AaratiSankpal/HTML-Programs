<html lang="en">
<head>

    <title>Collage Time table</title>
<style>
table{
    width: 80%;
    margin: 30px auto;
    border-collapse: collapse;
}

    border: 1px solid black;
    padding: 12px;
    text-align: center;
}

th{
    background-color: rgb(170, 167, 167);
    color: white;
}

tr:hover{
    background-color: lightblue;
}
</style>
</head>

</html>
