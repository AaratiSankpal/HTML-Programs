<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #bedaf2, #7db1f6);
    margin: 0;
}

.container{
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 15px gray;
}

h1{
    text-align: center;
    color: rgb(11, 90, 208);
}

img{
    display: block;
    margin: 20px auto;
    width: 300px;
    border-radius: 10px;
    transition: transform 0.3s;
    border: 2px solid;
}

img:hover{
    transform: scale(1.05);
}

table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td{
    border: 1px solid #333;
    padding: 12px;
    text-align: center;
}

th{
    background-color: #2a5298;
    color: white;
}

tr:hover{
    background-color: #f2f2f2;
}
</style>
</head>

<body>
<div class="container">
<h1>IPL 2026</h1>
<p>The biggest T20 cricket league is back with thrilling matches!</p>

<img src="ipl.jpeg" alt="IPL">

<table>
<tr>
<th>Team</th>
<th>Captain</th>
<th>Home Ground</th>
</tr>
<tr>
<td>MI</td>
<td>Rohit Sharma</td>
<td>Mumbai</td>
</tr>
<tr>
<td>CSK</td>
<td>MS Dhoni</td>
<td>Chennai</td>
</tr>
</table>
</div>
</body>
</html>
