<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Event Footer</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Footer Base */
.footer {
    background: #d0bebe;
    color: rgb(14, 13, 13);
    padding: 50px 20px;
}

.footer-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 40px;
    max-width: 1200px;
    margin: auto;
}

/* Footer Columns */
.footer-column {
    flex: 1 1 200px;
}

.footer-column h3 {
    margin-bottom: 15px;
}

.footer-column ul {
    list-style: none;
    padding: 0;
}

.footer-column ul li {
    margin-bottom: 10px;
}

.footer-column a {
    color: #3b3d3d;
    text-decoration: none;
    transition: color 0.3s;
}

.footer-column a:hover {
    color: white;
}

/* Newsletter */
.newsletter input {
    padding: 10px;
    width: 100%;
    margin-bottom: 10px;
    border-radius: 5px;
    border: none;
}

.newsletter button {
    padding: 10px;
    width: 100%;
    border: none;
    background: #e63946;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.newsletter button:hover {
    background: #c92c3a;
}

/* Social Icons */
.social-icons {
    display: flex;
    gap: 15px;
    margin-top: 15px;
}

.social-icons a {
    font-size: 20px;
    color: #bbb;
    text-decoration: none;
}

.social-icons a:hover {
    color: white;
}

/* Small Screen Layout */
@media (max-width: 768px) {
    .footer-container {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .footer-column {
        width: 100%;
        max-width: 400px;
    }

    .social-icons {
        justify-content: center;
    }
}
</style>
</head>
<body>

<footer class="footer">
    <div class="footer-container">

        <!-- About -->
        <div class="footer-column">
            <h3>Global Summit 2026</h3>
            <p>Connecting innovators, leaders, and creators from around the world.</p>
        </div>

        <!-- Quick Links -->
        <div class="footer-column">
            <h3>Quick Links</h3>
            <ul>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Speakers</a></li>
                <li><a href="#">Tickets</a></li>
                <li><a href="#">Venue</a></li>
            </ul>
        </div>

        <!-- Support -->
        <div class="footer-column">
            <h3>Support</h3>
            <ul>
                <li><a href="#">FAQ</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Privacy Policy</a></li>
            </ul>

            <div class="social-icons">
                <a href="#">🌐</a>
                <a href="#">🐦</a>
                <a href="#">📸</a>
                <a href="#">🎥</a>
            </div>
        </div>

        <!-- Newsletter -->
        <div class="footer-column newsletter">
            <h3>Subscribe</h3>
            <input type="email" placeholder="Enter your email">
            <button>Subscribe</button>
        </div>

    </div>
</footer>

</body>
</html>
