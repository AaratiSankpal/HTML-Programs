<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
body{
    font-family: Verdana;
    background: linear-gradient(to right, #f08de3, #a66cbd);
}

.container{
    width: 70%;

    padding: 20px;
    background: rgb(152, 186, 234);
    border-radius: 10px;
    border: 4px solid;
}

    color: rgb(114, 14, 156);
}

ul li:hover{
    color: green;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>XYZ Technologies</h1>

<p>XYZ Technologies is a leading IT company delivering innovative digital solutions worldwide.</p>

<h3>Our Services:</h3>
<ul>
<li>Web Development</li>

<li>Cloud Computing</li>
</ul>
</div>
