<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Top 2026 Travel Destinations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
            padding: 20px;
            color: hotpink;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        img{
            border: 2px solid black;
        }

        /* Tablet View */
        @media (max-width: 992px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Mobile View */
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<h1>Top 2026 Travel Destinations</h1>

<div class="gallery">
    <img src="Paris.jpeg" alt="Paris">
    <img src="Bali.jpeg" alt="Bali">
    <img src="Maldives.jpeg" alt="Maldives">
    <img src="Tokyo.jpeg" alt="Tokyo">
    <img src="Switzerland.jpeg" alt="Switzerland">
    <img src="Dubai.jpeg" alt="Dubai">
    <img src="NewYork.jpeg" alt="New York">
    <img src="Rome.jpeg" alt="Rome">
</div>

</body>
</html>
