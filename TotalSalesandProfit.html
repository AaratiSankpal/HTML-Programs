<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit And Loss Sales</title>
<style>
table{
    width: 70%;
    margin: 40px auto;
    border-collapse: collapse;
    box-shadow: 0 0 10px gray;
}

th, td{
    border: 1px solid black;
    padding: 12px;
    text-align: center;
}

th{
    background-color: rgb(136, 202, 202);
    color: white;
}

tr:hover{
    background-color: #e0f7fa;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Monthly Sales Report</h2>

<table>
<tr>
<th rowspan="2">Month</th>
<th colspan="2">Amount</th>
</tr>
<tr>
<th>Sales</th>
<th>Profit</th>
</tr>
<tr>
<td>Jan</td>
<td>50000</td>
<td>10000</td>
</tr>
<tr>
<td>Feb</td>
<td>60000</td>
<td>15000</td>
</tr>
</table>

</body>
</html>
