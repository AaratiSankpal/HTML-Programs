<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel menu</title>
<style>
body{
    font-family: 'Segoe UI';
    background-color: #ffe6cc;
}

.menu{
    width: 60%;
    margin: 40px auto;
    padding: 20px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 0 10px brown;
}

h1{
    text-align: center;
    color: darkred;
}

ul{
    list-style-type: circle;
    padding: 15px;
}

li:hover{
    color: red;
    cursor: pointer;
}

table{
    width: 100%;
    border-collapse: collapse;
}

th, td{
    border: 1px solid brown;
    padding: 10px;
    text-align: center;
}

th{
    background-color: brown;
    color: white;
}

tr:hover{
    background-color: #ffd9b3;
}
</style>
</head>

<body>
<div class="menu">
<h1>Royal Hotel Menu</h1>

<ul>
<li>Starters</li>
<li>Main Course</li>
<li>Desserts</li>
</ul>

<table>
<tr>
<th>Item</th>
<th>Price</th>
</tr>
<tr>
<td>Paneer Tikka</td>
<td>₹220</td>
</tr>
<tr>
<td>Veg Biryani</td>
<td>₹180</td>
</tr>
</table>
</div>
</body>
</html>
