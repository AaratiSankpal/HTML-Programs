<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #fdfaf6;
    color: #333;
}

/* Menu Container */
.menu {
    max-width: 1000px;
    margin: auto;
    padding: clamp(20px, 5vw, 60px);
    
}

/* Section Title */
.menu h1 {
    text-align: center;
    font-size: clamp(28px, 4vw, 48px);
    margin-bottom: clamp(20px, 4vw, 40px);
}

/* Description List */
dl {
    display: grid;
    gap: clamp(20px, 4vw, 40px);
}

/* Menu Item */
.menu-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: clamp(15px, 3vw, 30px);
    align-items: center;
    background: white;
    padding: clamp(15px, 3vw, 25px);
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    border: 2px solid;
}

/* Image */
.menu-item img {
    width: clamp(80px, 12vw, 140px);
    height: clamp(80px, 12vw, 140px);
    object-fit: cover;
    border-radius: 12px;
    border: 5px ridge;
}

/* Dish Name */
dt {
    font-size: clamp(18px, 2.5vw, 26px);
    font-weight: bold;
}

/* Description */
dd {
    margin: 5px 0 0 0;
    font-size: clamp(14px, 2vw, 18px);
    color: #666;
}

/* Price */
.price {
    font-size: clamp(16px, 2.5vw, 22px);
    font-weight: bold;
    color: #c0392b;
    margin-top: 5px;
}
h1{
    font-weight: 900;
    color: darkmagenta;
}
</style>
</head>
<body>

<section class="menu">
    <h1>Our Signature Dishes</h1>

    <dl>

        <div class="menu-item">
            <img src="creamyPasta.jpeg" alt="Pasta">
            <div>
                <dt>Truffle Cream Pasta</dt>
                <dd>Fresh fettuccine tossed in rich truffle cream sauce.</dd>
                <div class="price">$18</div>
            </div>
        </div>

        <div class="menu-item">
            <img src="Steak.jpeg" alt="Steak">
            <div>
                <dt>Grilled Ribeye Steak</dt>
                <dd>Juicy ribeye grilled to perfection with herb butter.</dd>
                <div class="price">$32</div>
            </div>
        </div>

        <div class="menu-item">
            <img src="salad.jpeg" alt="Salad">
            <div>
                <dt>Mediterranean Salad</dt>
                <dd>Crisp greens, feta cheese, olives & house vinaigrette.</dd>
                <div class="price">$14</div>
            </div>
        </div>

    </dl>
</section>

</body>
</html>
