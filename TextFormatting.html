<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting</title>
    <style>
        body {
            font-family: Arial;
            line-height: 1.9;
            letter-spacing: 2px;
        }

        h1 {
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>My Profile</h1>

    <p>
        My name is <b>Aarati Sankpal</b>. I enjoy <i>Music</i> and <u>traveling</u>.
    </p>

</body>
</html>
