<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
</head>
<body>

<h2>Feedback Form</h2>

<form>
    <label>Name:</label>
    <input type="text" name="name"><br><br>

    <p>Feedback Options:</p>

    <input type="radio" name="feedback"> Good<br>
    <input type="radio" name="feedback"> Average<br>
    <input type="radio" name="feedback"> Poor<br><br>

    <input type="submit" value="Submit">
</form>

</body>
</html>
