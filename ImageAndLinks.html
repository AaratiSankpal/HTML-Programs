<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image and Links</title>
    <style>
        img {
            width: 300px;
            border-radius: 20px;
        }

        a {
            text-decoration: none;
            color: green;
        }

        a:hover {
            color: orange;
        }
    </style>
</head>
<body>

    <h2>Beautiful Nature</h2>

    <img src="Nature.jpeg" alt="Nature Image">

    <p>
        Visit 
        <a href="https://www.nationalgeographic.com" target="_blank">
            National Geographic
        </a>
    </p>

</body>
</html>
