<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Feedback Form</title>
</head>
<body>

<h2>Feedback Form</h2>

<form>
    <label>Name:</label>
    <input type="text" name="name"><br><br>

    <label>Feedback:</label><br>
    <textarea rows="4" cols="40" placeholder="Enter your feedback here"></textarea><br><br>

    <label>Rating:</label><br>
    <input type="radio" name="rating"> Excellent<br>
    <input type="radio" name="rating"> Good<br>
    <input type="radio" name="rating"> Average<br><br>

    <input type="submit" value="Submit">
</form>

</body>
</html>
